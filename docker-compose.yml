services:
  mysql:
    image: mysql:8.4
    container_name: quantumops-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: assetflow_root
      MYSQL_DATABASE: assetflow
      MYSQL_USER: assetflow
      MYSQL_PASSWORD: assetflow_pass
    ports:
      - "3307:3306"
    volumes:
      - assetflow_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uassetflow", "-passetflow_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  assetflow_mysql:
